# nfpm config for building dsd .deb / .rpm packages from prebuilt binaries.
# Driven by env vars so one config produces every arch/format:
#   VERSION  e.g. 0.6.1   (no leading "v")
#   ARCH     amd64 | arm64 (nfpm maps to deb/rpm arch names per --packager)
# Built via scripts/build-packages.sh. No native toolchain — packages the
# CGO-free binaries that `make release` already produces in dist/.
name: dsd
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Andrei Beshkov <andrey.beshkov@gmail.com>
description: |
  OBD diagnostics for your Linux server — one command, full picture.
  dsd inspects CPU, memory, disk, network, services, containers, security and
  more in 1–3 seconds and prints a prioritized verdict. Single static binary,
  no agent, no daemon.
vendor: Keyorix
homepage: https://github.com/keyorixhq/dashdiag
license: MIT
contents:
  - src: ./dist/dsd-linux-${ARCH}
    dst: /usr/bin/dsd
    file_info:
      mode: 0755
  # Ship the docs the binary references in its hints.
  - src: ./README.md
    dst: /usr/share/doc/dsd/README.md
    file_info:
      mode: 0644
