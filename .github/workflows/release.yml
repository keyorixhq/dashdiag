name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    # SIGN is 'true' only when the signing key secret exists, so the signing step
    # below stays inert until the maintainer adds it (secrets can't be read inside
    # a step-level `if`, so map it to a job env here). See docs/RELEASE_SIGNING.md.
    env:
      SIGN: ${{ secrets.MINISIGN_SECRET_KEY != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}

      - uses: actions/setup-go@v6
        with: {go-version-file: 'go.mod', cache: true}

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Build all platforms
        run: |
          VERSION=$(git describe --tags --always)
          COMMIT=$(git rev-parse --short HEAD)
          BUILT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          MODULE=github.com/keyorixhq/dashdiag
          FLAGS="-X ${MODULE}/internal/version.Version=${VERSION} -X ${MODULE}/internal/version.Commit=${COMMIT} -X ${MODULE}/internal/version.Built=${BUILT} -s -w"
          mkdir -p dist
          GOOS=linux  GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$FLAGS" -trimpath -o dist/dsd-linux-amd64   ./cmd/dsd
          GOOS=linux  GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "$FLAGS" -trimpath -o dist/dsd-linux-arm64   ./cmd/dsd
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$FLAGS" -trimpath -o dist/dsd-darwin-amd64  ./cmd/dsd
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "$FLAGS" -trimpath -o dist/dsd-darwin-arm64  ./cmd/dsd
          cd dist && sha256sum dsd-* > checksums.txt

      - name: Build .deb / .rpm packages
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3
          scripts/build-packages.sh "${GITHUB_REF_NAME#v}"

      - name: Build AppImages
        run: |
          # Reuses the linux binaries already in dist/; fetches appimagetool itself.
          # The AppImage is the SteamOS / immutable-rootfs install path (survives OS updates).
          scripts/build-appimage.sh "${GITHUB_REF_NAME#v}"
          cd dist && sha256sum dsd-*.AppImage >> checksums.txt

      # Sign the FINAL checksums.txt with minisign — the authenticity anchor that
      # `dsd update` verifies in-binary (closes the self-updater single-origin gap).
      # Inert until the maintainer adds the MINISIGN_SECRET_KEY secret (SIGN env
      # above): a missing key SKIPS this step and never fails a release, exactly
      # like the Homebrew-tap job. checksums.txt.minisig ships via `files: dist/*`.
      - name: Sign checksums.txt (minisign)
        if: ${{ env.SIGN == 'true' }}
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq minisign
          umask 077
          printf '%s' "$MINISIGN_SECRET_KEY" > "$RUNNER_TEMP/minisign.key"
          # Pipe the password (empty line for a passwordless key) so signing is
          # non-interactive. -t records a trusted comment bound into the signature.
          printf '%s\n' "$MINISIGN_PASSWORD" | minisign -S \
            -s "$RUNNER_TEMP/minisign.key" \
            -m dist/checksums.txt \
            -t "dsd ${GITHUB_REF_NAME} checksums"
          rm -f "$RUNNER_TEMP/minisign.key"
          test -f dist/checksums.txt.minisig
          echo "Signed checksums.txt → checksums.txt.minisig"

      # Smoke-test EVERY artifact in a clean container before publishing — install
      # it the way a user would and confirm `dsd` runs. A broken artifact fails the
      # release here instead of reaching users (the install.sh P0, #123, shipped
      # because nothing tested the front door). amd64 only (release runner arch);
      # arm64 packages are built identically and the install.sh path is PR-guarded.
      - name: Smoke-test artifacts (before publishing)
        run: |
          set -e
          VER="${GITHUB_REF_NAME#v}"
          run() { docker run --rm -v "$PWD/dist:/d:ro" "$1" sh -c "$2"; }
          echo "::group::raw linux-amd64 binary"
          run debian:13 'install -m755 /d/dsd-linux-amd64 /usr/local/bin/dsd && dsd --version'
          echo "::group::.deb (dpkg)"
          run debian:13 "dpkg -i /d/dsd_${VER}_amd64.deb && dsd --version"
          echo "::group::.rpm (rpm)"
          run rockylinux:9 "rpm -i /d/dsd-${VER}-1.x86_64.rpm && dsd --version"
          echo "::group::AppImage (extract-and-run, no FUSE in CI)"
          run debian:13 "install -m755 /d/dsd-${VER}-x86_64.AppImage /tmp/a && /tmp/a --appimage-extract-and-run --version"
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  # Push the regenerated Homebrew formula to dashdiag/homebrew-tap.
  # Off by default — a no-op until the maintainer has:
  #   1. created the dashdiag/homebrew-tap repo,
  #   2. added a HOMEBREW_TAP_TOKEN secret (PAT with contents:write on the tap),
  #   3. set the HOMEBREW_TAP_ENABLED repo variable to 'true'.
  # Guarded so it never blocks or fails a release while disabled.
  update-tap:
    needs: release
    if: ${{ vars.HOMEBREW_TAP_ENABLED == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Generate formula for this tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x scripts/gen-homebrew-formula.sh
          scripts/gen-homebrew-formula.sh "$VERSION"

      - name: Push formula to tap repo
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/dashdiag/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp packaging/homebrew-tap/Formula/dsd.rb tap/Formula/dsd.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dsd.rb
          git commit -m "dsd ${VERSION}" || { echo "no change"; exit 0; }
          git push
