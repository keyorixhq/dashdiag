name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files need formatting:"
            gofmt -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -count=1 -timeout 60s ./...

      - name: Build all platforms
        if: matrix.os == 'ubuntu-22.04'
        run: |
          GOOS=linux  GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/dsd
          GOOS=linux  GOARCH=arm64 CGO_ENABLED=0 go build -o /dev/null ./cmd/dsd
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/dsd
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o /dev/null ./cmd/dsd

  # Guards the install front door — a P0 (broken one-liner for every new user,
  # #123) slipped through because install.sh had ZERO automated coverage. This
  # runs THIS branch's install.sh in a clean container against the latest
  # release and asserts dsd actually installs + runs, on both arches.
  install-smoke:
    name: Install one-liner (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v6

      # arm64 needs emulation on an amd64 runner.
      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Install via install.sh in a clean container
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/install.sh:/tmp/install.sh:ro" debian:13 sh -c '
              set -e
              apt-get update -qq >/dev/null
              apt-get install -y -qq curl ca-certificates >/dev/null
              sh /tmp/install.sh
              dsd --version
            '
