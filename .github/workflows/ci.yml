name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: every job here only reads the repo (tests, lint, smoke,
# shellcheck) — none write contents, comment, or upload. Scoped at the top so a
# new job can't silently inherit a broad default token.
permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-14, macos-15]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files need formatting:"
            gofmt -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -count=1 -timeout 60s ./...

      - name: Build all platforms
        if: matrix.os == 'ubuntu-22.04'
        run: |
          GOOS=linux  GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/dsd
          GOOS=linux  GOARCH=arm64 CGO_ENABLED=0 go build -o /dev/null ./cmd/dsd
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/dsd
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o /dev/null ./cmd/dsd

  # SSDLC Layer 1 (ADR-0007): the .golangci.yml gosec config previously only ran
  # locally / pre-push — nothing gated PRs. This is the PR security gate.
  lint:
    name: Lint + gosec (golangci-lint)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2  # keep in sync with local dev (brew)

  # SSDLC Layer 1 (ADR-0007): custom semgrep rules for our recurring risk
  # patterns (root-privileged exec + parsing). Rules live in .semgrep/.
  # Rule-per-finding discipline: every confirmed security finding ends with
  # the rule that catches its class.
  semgrep:
    name: Semgrep (custom rules)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: pipx install semgrep
      - run: semgrep scan --config .semgrep/ --error --severity ERROR --severity WARNING .

  # Guards the install front door — a P0 (broken one-liner for every new user,
  # #123) slipped through because install.sh had ZERO automated coverage. This
  # runs THIS branch's install.sh in a clean container against the latest
  # release and asserts dsd actually installs + runs, on both arches.
  install-smoke:
    name: Install one-liner (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v6

      # arm64 needs emulation on an amd64 runner.
      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Install via install.sh in a clean container (curl, default prefix)
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/install.sh:/tmp/install.sh:ro" debian:13 sh -c '
              set -e
              apt-get update -qq >/dev/null
              apt-get install -y -qq curl ca-certificates >/dev/null
              sh /tmp/install.sh
              dsd --version
            '

      # The wget branch (fetch_latest_version/download/verify_checksum all fork on
      # curl-vs-wget) was never exercised — a bug there ships silently to curl-less
      # minimal images. Arch-independent script logic, so amd64-only to skip slow
      # emulated arm64.
      - name: Install via wget-only path (no curl on the box)
        if: matrix.platform == 'linux/amd64'
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/install.sh:/tmp/install.sh:ro" debian:13 sh -c '
              set -e
              apt-get update -qq >/dev/null
              apt-get install -y -qq wget ca-certificates >/dev/null
              sh /tmp/install.sh
              dsd --version
            '

      # Fail-CLOSED guard (threat model CLI F-3): if integrity can't be verified the
      # installer must ABORT, not silently install an unverified binary. Simulate a
      # box with no hashing tool (remove sha256sum; shasum isn't present on debian),
      # then assert: default => non-zero exit AND nothing installed; --no-verify =>
      # installs. Without this guard the old silent skip-and-continue could regress.
      - name: Install fails closed when it cannot verify (and --no-verify overrides)
        if: matrix.platform == 'linux/amd64'
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/install.sh:/tmp/install.sh:ro" debian:13 sh -c '
              set -e
              apt-get update -qq >/dev/null
              apt-get install -y -qq curl ca-certificates >/dev/null
              rm -f /usr/bin/sha256sum /usr/bin/shasum   # leave the box with no way to hash
              if sh /tmp/install.sh; then echo "FAIL: installed without verification"; exit 1; fi
              if command -v dsd >/dev/null 2>&1; then echo "FAIL: dsd present after a refused install"; exit 1; fi
              echo "OK: refused unverified install"
              sh /tmp/install.sh --no-verify
              dsd --version
            '

      # The documented `--prefix DIR` flag (install.sh header line 4) was broken —
      # main() read the prefix positionally, so `--prefix` landed in ./--prefix/bin.
      # Guard the documented form so it can't silently regress again.
      - name: Install with documented --prefix flag (custom root)
        if: matrix.platform == 'linux/amd64'
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/install.sh:/tmp/install.sh:ro" debian:13 sh -c '
              set -e
              apt-get update -qq >/dev/null
              apt-get install -y -qq curl ca-certificates >/dev/null
              sh /tmp/install.sh --prefix /opt/dsd
              test -x /opt/dsd/bin/dsd
              /opt/dsd/bin/dsd --version
            '

  # Static lint of the install front door — cheap guard against the shell-scripting
  # bug class that produced the #123 P0 (a stdout/stderr mix-up that aborted every
  # install). shellcheck is preinstalled on GitHub ubuntu runners.
  shellcheck:
    name: Shellcheck install.sh
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck install.sh
