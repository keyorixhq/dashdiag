name: Feature Request
description: Suggest a new collector, flag, or command
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Feature requests with a concrete use case get prioritised faster."

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "When I was debugging X, I couldn't see Y..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would the output look like?
      placeholder: "dsd health --show-x would output..."

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New collector (new data source)
        - New output flag
        - New command
        - Performance improvement
        - Documentation
        - Other
    validations:
      required: true
