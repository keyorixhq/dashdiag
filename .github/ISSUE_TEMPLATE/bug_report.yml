name: Bug Report
description: Something is broken or producing wrong output
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting. Please fill in all fields — it helps fix the bug faster."

  - type: input
    id: version
    attributes:
      label: DashDiag version
      description: Run `dsd --version`
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (Ubuntu/Debian)
        - Linux (RHEL/CentOS/Fedora)
        - Linux (Arch)
        - Linux (other)
        - macOS (Apple Silicon)
        - macOS (Intel)
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command run
      placeholder: "dsd health --json"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual output
      description: Paste the full output including any error messages
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected output
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: System context (optional)
      description: Paste relevant parts of `dsd health --json` with sensitive info removed
      render: json
